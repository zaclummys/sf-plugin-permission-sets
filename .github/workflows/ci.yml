name: ci

# Runs on PRs and manual dispatch, and is callable by the publish workflow as
# its release gate (workflow_call), so build + test are defined once here.
# Split into parallel jobs: build typechecks and lints, test compiles lib (a
# wireit dependency of test:only) then runs the black-box plugin tests, which
# drive `sf ps ...`. The sf CLI is installed here and the vitest globalSetup
# links the built plugin into it.
on:
    pull_request:
    workflow_dispatch:
    workflow_call:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  # Pinned to 24: Node 26 removed Buffer.SlowBuffer, which the current
                  # lint toolchain still depends on transitively.
                  node-version: '24'
                  cache: npm
            - run: npm ci
            - run: npm run build

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: '24'
                  cache: npm
            - run: npm ci
            - run: npm install --global @salesforce/cli
            - run: npm run test:only
