name: ci

# Runs on PRs and manual dispatch, and is callable by the publish workflow as
# its release gate (workflow_call), so build + test are defined once here.
# Split into parallel jobs: build typechecks and lints, test compiles lib (a
# wireit dependency of test) then runs the black-box plugin tests, which
# drive `sf ps ...`. The sf CLI is installed here and the vitest globalSetup
# links the built plugin into it.
on:
    pull_request:
    workflow_dispatch:
    workflow_call:
        # Reusable workflows do not inherit the caller's secrets, so the release gate
        # (publish.yml) must pass this in. Optional: on triggers without it (fork PRs)
        # the auth step just fails, same as running ci directly without the secret.
        secrets:
            SFDX_AUTH_URL:
                description: Auth URL for the org the real-org tests authenticate against.
                required: false

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  # Pinned to 24: Node 26 removed Buffer.SlowBuffer, which the current
                  # lint toolchain still depends on transitively.
                  node-version: '24'
                  cache: npm
            - run: npm ci
            - run: npm run build

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: '24'
                  cache: npm
            - run: npm ci
            - run: npm install --global @salesforce/cli
              # Authenticate the org the real-org suites target and hand its alias to the
              # tests via PS_TARGET_ORG. --sfdx-url-stdin must come last: the parser eats the
              # token after it as the flag's value before reading stdin.
            - name: Authenticate the test org
              run: |
                  echo "$SFDX_AUTH_URL" | sf org login sfdx-url --alias ci-target-org --sfdx-url-stdin
                  echo "PS_TARGET_ORG=ci-target-org" >> "$GITHUB_ENV"
              env:
                  SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
            - run: npm test
