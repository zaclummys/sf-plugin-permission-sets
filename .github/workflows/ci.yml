name: ci

# Runs on PRs and manual dispatch, and is callable by the publish workflow as
# its release gate (workflow_call), so build + test are defined once here.
# Split into parallel jobs: build typechecks and lints, test runs vitest (which
# transpiles TS itself, so it needs no prior build).
on:
    pull_request:
    workflow_dispatch:
    workflow_call:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  # Pinned to 24: Node 26 removed Buffer.SlowBuffer, which the current
                  # lint toolchain still depends on transitively.
                  node-version: '24'
                  cache: npm
            - run: npm ci
            - run: npm run build

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: npm
            - run: npm ci
            - run: npm run test:only
