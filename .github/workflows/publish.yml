name: publish

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine version and dist-tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Real release: version comes from the git tag (the single source of truth).
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            case "$VERSION" in
              *-*) TAG=next ;;
              *)   TAG=latest ;;
            esac
          else
            # Snapshot on every push to main, for client testing. Unique and increasing.
            VERSION="0.0.0-dev.${{ github.run_number }}"
            TAG=dev
          fi
          
          echo "Resolved version $VERSION for dist-tag $TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update
        run: npm install -g npm@latest

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Update Version
        run: npm pkg set version="${{ steps.ver.outputs.version }}"

      - name: Publish
        run: npm publish --provenance --access public --tag "${{ steps.ver.outputs.tag }}"

  smoke-test:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install the published plugin and dry-run it
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          PKG="sf-plugin-permission-sets@$VERSION"

          echo "Smoke-testing $PKG"

          # Wait for the just-published version to be installable (registry propagation).
          for i in 1 2 3 4 5 6; do
            if npm view "$PKG" version >/dev/null 2>&1; then echo "available on registry"; break; fi
            echo "waiting for npm propagation ($i)"; sleep 10
          done

          yes | sf plugins install "$PKG"

      - name: Dry-run the plugin
        run: sf help ps